<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>거의 다 왔어요™</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-box">
    <h1>거의 다 왔어요™</h1>
    <p id="message">완료 버튼을 누르면 모든 작업이 끝납니다.</p>

    <div class="progress-box">
      <div id="progress-bar"></div>
    </div>

    <p id="percent">0%</p>

    <button id="startBtn">시작하기</button>
    <button id="finishBtn">완료하기</button>
    <button id="cancelBtn">취소하기</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
